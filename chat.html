<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat — NyxoAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #09090d;
      --surface:     #0e0e14;
      --card:        #121218;
      --card-border: #1d1d27;
      --card-hover:  #161620;
      --text:        #ededf4;
      --sub:         #8c8ca4;
      --muted:       #4e4e65;
      --accent:      #7b8bff;
      --accent-dim:  rgba(123,139,255,.11);
      --accent-glow: rgba(123,139,255,.20);
      --green:       #4ade80;
      --green-dim:   rgba(74,222,128,.10);
      --red:         #f87171;
      --red-dim:     rgba(248,113,113,.10);
      --divider:     rgba(255,255,255,.054);
      --shadow-xl:   0 32px 80px rgba(0,0,0,.65);
      --shadow-md:   0 8px 32px rgba(0,0,0,.38);
      --r:           14px;
      --r-sm:        9px;
      --r-xs:        6px;
    }

    html[data-theme="light"] {
      --bg:          #f4f4fa;
      --surface:     #fafaff;
      --card:        #ffffff;
      --card-border: #e0e0ec;
      --card-hover:  #f0f0f9;
      --text:        #0b0b18;
      --sub:         #5a5a76;
      --muted:       #9494ae;
      --accent:      #4d5ee8;
      --accent-dim:  rgba(77,94,232,.09);
      --accent-glow: rgba(77,94,232,.16);
      --green:       #16a34a;
      --green-dim:   rgba(22,163,74,.09);
      --red:         #dc2626;
      --red-dim:     rgba(220,38,38,.08);
      --divider:     rgba(0,0,0,.07);
      --shadow-xl:   0 32px 80px rgba(0,0,0,.09);
      --shadow-md:   0 8px 32px rgba(0,0,0,.07);
    }

    html, body { height: 100%; }

    body {
      font-family: 'Geist', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: background .3s, color .3s;
    }

    .topbar {
      height: 54px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; border-bottom: 1px solid var(--divider);
      z-index: 50;
    }
    html[data-theme="dark"]  .topbar { background: rgba(9,9,13,.92); backdrop-filter: blur(20px); }
    html[data-theme="light"] .topbar { background: rgba(244,244,250,.92); backdrop-filter: blur(20px); }

    .topbar-left { display: flex; align-items: center; gap: 10px; }

    .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .logo-img { width: 24px; height: 24px; object-fit: contain; border-radius: 6px; }
    .logo-text { font-family: 'Bricolage Grotesque', sans-serif; font-size: 1rem; font-weight: 700; letter-spacing: -.03em; color: var(--text); }

    .topbar-sep { width: 1px; height: 18px; background: var(--divider); }

    .model-badge {
      display: flex; align-items: center; gap: 7px;
      font-size: .82rem; font-weight: 500; color: var(--sub);
    }
    .model-badge-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
    .model-badge-name { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 600; color: var(--text); }

    .topbar-right { display: flex; align-items: center; gap: 6px; }

    .icon-btn {
      width: 32px; height: 32px; border-radius: var(--r-sm);
      background: transparent; border: 1px solid var(--card-border);
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .14s, border-color .14s, color .14s;
    }
    .icon-btn:hover { background: var(--card); border-color: var(--accent); color: var(--text); }
    .icon-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }

    .shell {
      flex: 1; display: flex; overflow: hidden;
    }

    .sidebar {
      width: 240px; flex-shrink: 0;
      border-right: 1px solid var(--divider);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .sidebar-top {
      padding: 14px 12px 10px;
      border-bottom: 1px solid var(--divider);
      flex-shrink: 0;
    }

    .new-chat-btn {
      width: 100%; display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; border-radius: var(--r-sm);
      background: var(--accent); border: none; color: #fff;
      font-family: 'Geist', sans-serif; font-size: .83rem; font-weight: 500;
      cursor: pointer; transition: opacity .15s;
    }
    .new-chat-btn:hover { opacity: .88; }
    .new-chat-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

    .sidebar-label {
      font-size: .64rem; font-weight: 600; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted);
      padding: 12px 12px 6px;
    }

    .chat-list { flex: 1; overflow-y: auto; }
    .chat-list::-webkit-scrollbar { width: 3px; }
    .chat-list::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }

    .chat-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; cursor: pointer;
      border-left: 2px solid transparent;
      transition: background .12s, border-color .12s;
      position: relative;
    }
    .chat-item:hover { background: var(--card-hover); }
    .chat-item.active {
      background: var(--accent-dim);
      border-left-color: var(--accent);
    }

    .chat-item-icon {
      width: 28px; height: 28px; border-radius: 7px;
      background: var(--surface); border: 1px solid var(--card-border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .chat-item-icon svg { width: 12px; height: 12px; stroke: var(--muted); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .chat-item.active .chat-item-icon { background: var(--accent-dim); border-color: rgba(123,139,255,.25); }
    .chat-item.active .chat-item-icon svg { stroke: var(--accent); }

    .chat-item-info { flex: 1; min-width: 0; }
    .chat-item-title { font-size: .81rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-item-time  { font-size: .68rem; color: var(--muted); margin-top: 1px; }

    .chat-item-del {
      width: 22px; height: 22px; border-radius: var(--r-xs);
      background: transparent; border: none; color: var(--muted);
      cursor: pointer; display: none; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .12s, color .12s;
    }
    .chat-item:hover .chat-item-del { display: flex; }
    .chat-item-del:hover { background: var(--red-dim); color: var(--red); }
    .chat-item-del svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .main-area {
      flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden;
    }

    .messages-area {
      flex: 1; overflow-y: auto; padding: 28px 0;
      scroll-behavior: smooth;
    }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 4px; }

    .messages-inner { max-width: 760px; margin: 0 auto; padding: 0 24px; }

    .empty-chat {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 12px;
      text-align: center; padding: 40px 20px;
    }
    .empty-chat-icon {
      width: 52px; height: 52px; border-radius: 14px;
      background: var(--accent-dim);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 4px;
    }
    .empty-chat-icon svg { width: 24px; height: 24px; stroke: var(--accent); fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    .empty-chat-title { font-family: 'Bricolage Grotesque', sans-serif; font-size: 1.15rem; font-weight: 700; letter-spacing: -.025em; color: var(--text); }
    .empty-chat-sub { font-size: .84rem; color: var(--muted); max-width: 280px; line-height: 1.6; }

    .msg { display: flex; gap: 12px; margin-bottom: 22px; }
    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px; height: 30px; border-radius: 50%;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-family: 'Bricolage Grotesque', sans-serif; font-size: .75rem; font-weight: 700;
      color: var(--accent); background: var(--accent-dim);
      border: 1px solid var(--card-border); overflow: hidden; margin-top: 2px;
    }
    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .msg-avatar.ai { background: var(--surface); }
    .msg-avatar.ai svg { width: 14px; height: 14px; stroke: var(--accent); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    .msg-content { max-width: 82%; display: flex; flex-direction: column; gap: 6px; }

    .msg-bubble {
      padding: 11px 15px; border-radius: var(--r-sm);
      font-size: .875rem; line-height: 1.68; color: var(--text);
    }

    .msg.user .msg-bubble {
      background: var(--accent); color: #fff;
      border-radius: var(--r-sm) 4px var(--r-sm) var(--r-sm);
    }
    .msg.ai .msg-bubble {
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: 4px var(--r-sm) var(--r-sm) var(--r-sm);
    }

    .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 700; letter-spacing: -.025em;
      color: var(--text); margin: 14px 0 6px;
    }
    .msg-bubble h1 { font-size: 1.15rem; }
    .msg-bubble h2 { font-size: 1rem; }
    .msg-bubble h3 { font-size: .92rem; }
    .msg.user .msg-bubble h1, .msg.user .msg-bubble h2, .msg.user .msg-bubble h3 { color: #fff; }
    .msg-bubble p { margin-bottom: 8px; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble strong { font-weight: 600; }
    .msg-bubble em { font-style: italic; opacity: .85; }
    .msg-bubble code {
      font-family: 'Geist', monospace; font-size: .8rem;
      background: rgba(0,0,0,.22); padding: 2px 6px;
      border-radius: 4px; color: var(--accent);
    }
    .msg.user .msg-bubble code { background: rgba(255,255,255,.15); color: rgba(255,255,255,.95); }
    .msg-bubble pre {
      background: var(--surface); border: 1px solid var(--card-border);
      border-radius: var(--r-xs); padding: 13px 15px;
      overflow-x: auto; margin: 10px 0;
    }
    .msg.user .msg-bubble pre { background: rgba(0,0,0,.25); border-color: rgba(255,255,255,.12); }
    .msg-bubble pre code { background: none; padding: 0; color: var(--sub); font-size: .79rem; }
    .msg.user .msg-bubble pre code { color: rgba(255,255,255,.8); }
    .msg-bubble ul, .msg-bubble ol { padding-left: 18px; margin-bottom: 8px; }
    .msg-bubble li { margin-bottom: 3px; }
    .msg-bubble blockquote {
      border-left: 3px solid var(--accent); padding-left: 12px;
      margin: 8px 0; color: var(--sub); font-style: italic;
    }
    .msg-bubble hr { border: none; border-top: 1px solid var(--divider); margin: 12px 0; }
    .msg-bubble a { color: var(--accent); text-decoration: underline; }
    .msg.user .msg-bubble a { color: rgba(255,255,255,.85); }

    .msg-img {
      max-width: 100%; max-height: 300px; border-radius: var(--r-sm);
      object-fit: contain; display: block;
      border: 1px solid var(--card-border);
    }

    .ai-img {
      max-width: 100%; max-height: 400px; border-radius: var(--r-sm);
      object-fit: contain; display: block;
      border: 1px solid var(--card-border);
      margin-top: 8px;
    }

    .typing-bubble {
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: 4px var(--r-sm) var(--r-sm) var(--r-sm);
      padding: 13px 16px;
      display: flex; align-items: center; gap: 10px;
    }

    .typing-dots { display: flex; gap: 4px; align-items: center; }
    .typing-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent); opacity: .4;
      animation: dotBounce .8s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .14s; }
    .typing-dots span:nth-child(3) { animation-delay: .28s; }
    @keyframes dotBounce { 0%,80%,100% { transform:scale(.7); opacity:.3; } 40% { transform:scale(1); opacity:1; } }

    .typing-label {
      font-size: .78rem; color: var(--muted); font-style: italic;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity:.5; } 50% { opacity:1; } }

    .typing-cursor {
      display: inline-block; width: 2px; height: 1em;
      background: var(--accent); margin-left: 2px;
      vertical-align: text-bottom; border-radius: 1px;
      animation: blink .55s steps(1) infinite;
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

    .input-area {
      flex-shrink: 0; padding: 12px 16px;
      border-top: 1px solid var(--divider);
    }
    .input-inner { max-width: 760px; margin: 0 auto; }

    .img-preview-row {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .img-preview {
      position: relative; width: 72px; height: 72px;
      border-radius: var(--r-sm); overflow: hidden;
      border: 1px solid var(--card-border);
    }
    .img-preview img { width: 100%; height: 100%; object-fit: cover; }
    .img-preview-rm {
      position: absolute; top: 3px; right: 3px;
      width: 18px; height: 18px; border-radius: 50%;
      background: rgba(0,0,0,.65); border: none;
      color: #fff; cursor: pointer; font-size: .7rem;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }

    .input-row {
      display: flex; align-items: flex-end; gap: 8px;
    }

    .input-box {
      flex: 1; padding: 10px 14px;
      background: var(--surface); border: 1px solid var(--card-border);
      border-radius: var(--r-sm); color: var(--text);
      font-family: 'Geist', sans-serif; font-size: .875rem;
      outline: none; resize: none;
      min-height: 42px; max-height: 140px; line-height: 1.55;
      transition: border-color .16s;
    }
    .input-box::placeholder { color: var(--muted); }
    .input-box:focus { border-color: var(--accent); }

    .img-btn, .send-btn {
      width: 40px; height: 40px; border-radius: var(--r-sm);
      border: none; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .15s, background .15s;
    }
    .img-btn {
      background: var(--surface); border: 1px solid var(--card-border);
      color: var(--muted);
    }
    .img-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .img-btn svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

    .send-btn { background: var(--accent); color: #fff; }
    .send-btn:hover { opacity: .88; }
    .send-btn:disabled { opacity: .3; cursor: not-allowed; }
    .send-btn svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

    .modal-bg {
      position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,.6); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center; padding: 24px;
      opacity: 0; pointer-events: none; transition: opacity .22s;
    }
    .modal-bg.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--card); border: 1px solid var(--card-border);
      border-radius: var(--r); padding: 32px; width: 100%; max-width: 440px;
      box-shadow: var(--shadow-xl);
      transform: scale(.96) translateY(12px);
      transition: transform .24s cubic-bezier(.16,1,.3,1);
    }
    .modal-bg.open .modal { transform: scale(1) translateY(0); }

    .modal-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--accent-dim); display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
    }
    .modal-icon svg { width: 22px; height: 22px; stroke: var(--accent); fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }

    .modal-title { font-family: 'Bricolage Grotesque', sans-serif; font-size: 1.15rem; font-weight: 800; letter-spacing: -.03em; color: var(--text); margin-bottom: 6px; }
    .modal-sub { font-size: .82rem; color: var(--muted); line-height: 1.6; margin-bottom: 22px; }

    .modal-input {
      width: 100%; padding: 11px 14px;
      background: var(--surface); border: 1px solid var(--card-border);
      border-radius: var(--r-sm); color: var(--text);
      font-family: 'Geist', sans-serif; font-size: .875rem;
      outline: none; margin-bottom: 14px; transition: border-color .16s;
    }
    .modal-input:focus { border-color: var(--accent); }
    .modal-input::placeholder { color: var(--muted); }

    .modal-btn {
      width: 100%; padding: 11px;
      background: var(--accent); border: none; border-radius: var(--r-sm);
      color: #fff; font-family: 'Geist', sans-serif;
      font-size: .875rem; font-weight: 500; cursor: pointer;
      transition: opacity .15s;
    }
    .modal-btn:hover { opacity: .88; }

    .modal-err { font-size: .78rem; color: var(--red); margin-top: 8px; display: none; }
    .modal-err.show { display: block; }

    .toast {
      position: fixed; bottom: 20px; right: 20px; z-index: 500;
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; background: var(--card);
      border: 1px solid var(--card-border); border-radius: var(--r-sm);
      box-shadow: var(--shadow-xl); font-size: .82rem; color: var(--text);
      opacity: 0; transform: translateY(10px);
      transition: opacity .2s, transform .2s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); pointer-events: all; }
    .toast-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
    .toast-dot.err { background: var(--red); }

    @media (max-width: 700px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <a class="logo" href="index.html">
        <img class="logo-img" src="img/icon.png" alt="" onerror="this.style.display='none'">
        <span class="logo-text">NyxoAI</span>
      </a>
      <div class="topbar-sep"></div>
      <div class="model-badge">
        <span class="model-badge-dot"></span>
        <span id="modelNameDisplay">Loading...</span>
      </div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme">
        <svg id="iconMoon" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <circle cx="12" cy="12" r="5" fill="currentColor" stroke="none"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <button class="icon-btn" onclick="showApiKeyModal()" title="API Key">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </button>
      <button class="icon-btn" onclick="newChat()" title="New chat">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </header>

  <div class="shell">

    <aside class="sidebar">
      <div class="sidebar-top">
        <button class="new-chat-btn" onclick="newChat()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New chat
        </button>
      </div>
      <div class="sidebar-label">Chats</div>
      <div class="chat-list" id="chatList"></div>
    </aside>

    <div class="main-area">
      <div class="messages-area" id="messagesArea">
        <div class="messages-inner" id="messagesInner">
          <div class="empty-chat" id="emptyChat">
            <div class="empty-chat-icon">
              <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <div class="empty-chat-title">Start a conversation</div>
            <div class="empty-chat-sub">Send a message or attach an image to begin chatting with this model.</div>
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-inner">
          <div class="img-preview-row" id="imgPreviewRow" style="display:none"></div>
          <div class="input-row">
            <button class="img-btn" onclick="document.getElementById('imgInput').click()" title="Attach image">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </button>
            <input type="file" id="imgInput" accept="image/*" multiple style="display:none" onchange="handleImgSelect(this)">
            <textarea class="input-box" id="inputBox" placeholder="Message the model..." rows="1"
              onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
              <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div class="modal-bg" id="apiKeyModal">
    <div class="modal">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <div class="modal-title">Enter your API key</div>
      <div class="modal-sub">Your NyxoAI API key is required to send messages. It will be saved in your browser and not shared anywhere.</div>
      <input class="modal-input" id="apiKeyInput" type="text" placeholder="nyxo_...">
      <button class="modal-btn" onclick="saveApiKey()">Save &amp; Continue</button>
      <div class="modal-err" id="apiKeyErr">Please enter a valid API key.</div>
    </div>
  </div>

  <div class="toast" id="toast">
    <span class="toast-dot" id="toastDot"></span>
    <span id="toastMsg"></span>
  </div>

  <script>
    (function () {
      const t = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
      syncIcons(t);
    })();

    function syncIcons(t) {
      document.getElementById('iconMoon').style.display = t === 'dark'  ? '' : 'none';
      document.getElementById('iconSun').style.display  = t === 'light' ? '' : 'none';
    }

    function toggleTheme() {
      const html = document.documentElement;
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      syncIcons(next);
    }

    const modelKey  = new URLSearchParams(window.location.search).get('model') || '';
    const username  = (localStorage.getItem('username') || '').trim();
    const STORE_KEY = 'nyxo_chats_' + modelKey;

    document.getElementById('modelNameDisplay').textContent = modelKey || 'Unknown Model';

    let sessions     = [];
    let activeSessId = null;
    let pendingImgs  = [];
    let isSending    = false;

    let toastTimer;
    function showToast(msg, err = false) {
      const t  = document.getElementById('toast');
      document.getElementById('toastDot').className = 'toast-dot' + (err ? ' err' : '');
      document.getElementById('toastMsg').textContent = msg;
      clearTimeout(toastTimer);
      t.classList.add('show');
      toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
    }

    function loadSessions() {
      try {
        const raw = localStorage.getItem(STORE_KEY);
        sessions = raw ? JSON.parse(raw) : [];
      } catch { sessions = []; }
    }

    function saveSessions() {
      try { localStorage.setItem(STORE_KEY, JSON.stringify(sessions)); } catch {}
    }

    function getActiveSession() {
      return sessions.find(s => s.id === activeSessId) || null;
    }

    function renderSidebar() {
      const list = document.getElementById('chatList');
      list.innerHTML = '';
      if (sessions.length === 0) {
        list.innerHTML = '<div style="padding:12px 16px;font-size:.78rem;color:var(--muted)">No chats yet</div>';
        return;
      }
      sessions.slice().reverse().forEach(sess => {
        const el = document.createElement('div');
        el.className = 'chat-item' + (sess.id === activeSessId ? ' active' : '');
        el.onclick   = () => switchSession(sess.id);

        const timeStr = new Date(sess.updatedAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

        el.innerHTML = `
          <div class="chat-item-icon">
            <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <div class="chat-item-info">
            <div class="chat-item-title">${esc(sess.title)}</div>
            <div class="chat-item-time">${timeStr}</div>
          </div>
          <button class="chat-item-del" onclick="deleteSession(event,'${sess.id}')" title="Delete">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
          </button>`;
        list.appendChild(el);
      });
    }

    function renderMessages() {
      const inner   = document.getElementById('messagesInner');
      const empty   = document.getElementById('emptyChat');
      const session = getActiveSession();

      inner.innerHTML = '';
      inner.appendChild(empty);

      if (!session || session.messages.length === 0) {
        empty.style.display = 'flex';
        return;
      }

      empty.style.display = 'none';
      session.messages.forEach(m => appendMsgDOM(m.role, m.content, m.images || [], false));
      scrollBottom();
    }

    function appendMsgDOM(role, content, images = [], animate = false) {
      const inner = document.getElementById('messagesInner');
      document.getElementById('emptyChat').style.display = 'none';

      const b64  = (localStorage.getItem('base64') || '').trim();
      const init = (username || 'U').charAt(0).toUpperCase();

      let avatarHTML;
      if (role === 'user') {
        avatarHTML = b64 && b64.startsWith('data:image')
          ? `<div class="msg-avatar"><img src="${b64}" alt=""></div>`
          : `<div class="msg-avatar">${init}</div>`;
      } else {
        avatarHTML = `<div class="msg-avatar ai"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>`;
      }

      const msgEl = document.createElement('div');
      msgEl.className = 'msg ' + role;

      let imgsHTML = '';
      if (images.length > 0) {
        imgsHTML = images.map(src => `<img class="msg-img" src="${src}" alt="attached image">`).join('');
      }

      if (role === 'user') {
        const safeContent = esc(content);
        msgEl.innerHTML = avatarHTML + `<div class="msg-content">${imgsHTML ? '<div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:flex-end">' + imgsHTML + '</div>' : ''}<div class="msg-bubble">${safeContent}</div></div>`;
        inner.appendChild(msgEl);
        scrollBottom();
        return msgEl;
      }

      const bubbleEl = document.createElement('div');
      bubbleEl.className = 'msg-bubble';

      const aiImgs = extractBase64Images(content);
      const textContent = content.replace(/data:image\/[a-zA-Z]+;base64,[^\s"'<>]+/g, '').trim();

      msgEl.innerHTML = avatarHTML;
      const contentWrap = document.createElement('div');
      contentWrap.className = 'msg-content';
      contentWrap.appendChild(bubbleEl);

      if (aiImgs.length > 0) {
        aiImgs.forEach(src => {
          const imgEl = document.createElement('img');
          imgEl.className = 'ai-img'; imgEl.src = src; imgEl.alt = 'AI generated image';
          contentWrap.appendChild(imgEl);
        });
      }

      msgEl.appendChild(contentWrap);
      inner.appendChild(msgEl);

      if (animate) {
        typewrite(textContent, bubbleEl);
      } else {
        bubbleEl.innerHTML = parseMarkdown(textContent);
      }

      scrollBottom();
      return msgEl;
    }

    function extractBase64Images(text) {
      const matches = text.match(/data:image\/[a-zA-Z]+;base64,[^\s"'<>]+/g);
      return matches || [];
    }

    function typewrite(text, el) {
      const chars = [...text];
      let i = 0, built = '';
      const cursor = document.createElement('span');
      cursor.className = 'typing-cursor';
      el.appendChild(cursor);

      function tick() {
        if (i >= chars.length) {
          cursor.remove();
          el.innerHTML = parseMarkdown(text);
          return;
        }
        const chunk = chars.length - i > 150 ? 5 : 1;
        for (let j = 0; j < chunk && i < chars.length; j++) built += chars[i++];
        el.innerHTML = built.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
        el.appendChild(cursor);
        scrollBottom();
        setTimeout(tick, chars.length - i > 150 ? 5 : 18);
      }
      tick();
    }

    function parseMarkdown(text) {
      let html = text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${code.trim()}</code></pre>`)
        .replace(/`([^`\n]+)`/g, '<code>$1</code>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm,  '<h2>$1</h2>')
        .replace(/^# (.+)$/gm,   '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g,   '<em>$1</em>')
        .replace(/^---$/gm, '<hr>')
        .replace(/^> (.+)$/gm,   '<blockquote>$1</blockquote>')
        .replace(/^\* (.+)$/gm,  '<li>$1</li>')
        .replace(/^- (.+)$/gm,   '<li>$1</li>')
        .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
        .replace(/(<li>.*<\/li>(\n|$))+/g, m => '<ul>' + m + '</ul>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

      html = html.split('\n').map(line => {
        const t = line.trim();
        if (!t) return '';
        if (/^<(h[1-3]|pre|ul|ol|li|hr|blockquote)/.test(t)) return t;
        return `<p>${t}</p>`;
      }).filter(Boolean).join('\n');

      return html;
    }

    function addThinking() {
      const inner = document.getElementById('messagesInner');
      document.getElementById('emptyChat').style.display = 'none';

      const el = document.createElement('div');
      el.className = 'msg ai'; el.id = 'thinkingMsg';
      el.innerHTML = `
        <div class="msg-avatar ai"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
        <div class="msg-content">
          <div class="typing-bubble">
            <div class="typing-dots"><span></span><span></span><span></span></div>
            <span class="typing-label" id="thinkingLabel">Thinking</span>
          </div>
        </div>`;
      inner.appendChild(el);

      const steps = ['Thinking', 'Processing request', 'Generating response', 'Almost done'];
      let s = 0;
      el._interval = setInterval(() => {
        s = (s + 1) % steps.length;
        const lbl = document.getElementById('thinkingLabel');
        if (lbl) lbl.textContent = steps[s];
      }, 1200);

      scrollBottom();
      return el;
    }

    function removeThinking() {
      const el = document.getElementById('thinkingMsg');
      if (el) { clearInterval(el._interval); el.remove(); }
    }

    function scrollBottom() {
      const area = document.getElementById('messagesArea');
      area.scrollTop = area.scrollHeight;
    }

    function newChat() {
      const id   = 'sess_' + Date.now();
      const sess = { id, title: 'New chat', messages: [], createdAt: Date.now(), updatedAt: Date.now() };
      sessions.unshift(sess);
      saveSessions();
      activeSessId = id;
      renderSidebar();
      renderMessages();
    }

    function switchSession(id) {
      activeSessId = id;
      renderSidebar();
      renderMessages();
    }

    function deleteSession(e, id) {
      e.stopPropagation();
      sessions = sessions.filter(s => s.id !== id);
      saveSessions();
      if (activeSessId === id) {
        activeSessId = sessions.length > 0 ? sessions[0].id : null;
        if (!activeSessId) newChat();
        else { renderSidebar(); renderMessages(); }
      } else { renderSidebar(); }
    }

    function handleImgSelect(input) {
      Array.from(input.files).forEach(file => {
        if (file.size > 5 * 1024 * 1024) { showToast('Image must be under 5 MB', true); return; }
        const reader = new FileReader();
        reader.onload = e => {
          pendingImgs.push(e.target.result);
          renderImgPreviews();
        };
        reader.readAsDataURL(file);
      });
      input.value = '';
    }

    function renderImgPreviews() {
      const row = document.getElementById('imgPreviewRow');
      row.innerHTML = '';
      if (pendingImgs.length === 0) { row.style.display = 'none'; return; }
      row.style.display = 'flex';
      pendingImgs.forEach((src, i) => {
        const wrap = document.createElement('div');
        wrap.className = 'img-preview';
        wrap.innerHTML = `<img src="${src}" alt=""><button class="img-preview-rm" onclick="removeImg(${i})">x</button>`;
        row.appendChild(wrap);
      });
    }

    function removeImg(i) {
      pendingImgs.splice(i, 1);
      renderImgPreviews();
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 140) + 'px';
    }

    async function sendMessage() {
      if (isSending) return;
      const input   = document.getElementById('inputBox');
      const msgText = input.value.trim();
      const apiKey  = localStorage.getItem('api-key') || '';

      if (!apiKey) { showApiKeyModal(); return; }
      if (!msgText && pendingImgs.length === 0) return;
      if (!activeSessId) newChat();

      isSending = true;
      document.getElementById('sendBtn').disabled = true;
      input.value = '';
      autoResize(input);

      const imgs = [...pendingImgs];
      pendingImgs = [];
      renderImgPreviews();

      const session = getActiveSession();
      if (!session) { isSending = false; return; }

      let fullMessage = msgText;
      if (imgs.length > 0) {
        fullMessage += (fullMessage ? '\n\n' : '') + imgs.map((b64, i) => `[Image ${i + 1}]: ${b64}`).join('\n');
      }

      const userMsg = { role: 'user', content: msgText, images: imgs, timestamp: Date.now() };
      session.messages.push(userMsg);

      if (session.title === 'New chat' && msgText) {
        session.title = msgText.slice(0, 38) + (msgText.length > 38 ? '...' : '');
      }

      session.updatedAt = Date.now();
      saveSessions();
      appendMsgDOM('user', msgText, imgs, false);
      renderSidebar();

      const thinkEl = addThinking();

      try {
        const r = await fetch('/api/v1/assistant', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, apiKey, message: fullMessage, modelKey, think: 'LOW' })
        });

        const d = await r.json();
        removeThinking();

        if (!r.ok) {
          const errMap = {
            nyxoAI_missing_fields:   'Missing required fields.',
            nyxoAI_invalid_user:     'Invalid user. Please log in again.',
            nyxoAI_invalid_api_key:  'Invalid API key. Update it using the lock icon.',
            nyxoAI_not_enough_tokens:'Not enough tokens.',
            nyxoAI_invalid_model:    'Model not found.',
            nyxoAI_server_error:     'Server error. Try again.'
          };
          const errMsg = errMap[d.error] || d.error || 'An error occurred.';
          showToast(errMsg, true);

          if (d.error === 'nyxoAI_invalid_api_key') showApiKeyModal();
        } else {
          const reply = d[modelKey] || Object.values(d)[0] || 'No response.';
          const aiMsg = { role: 'assistant', content: reply, images: [], timestamp: Date.now() };
          session.messages.push(aiMsg);
          session.updatedAt = Date.now();
          saveSessions();
          renderSidebar();
          appendMsgDOM('assistant', reply, [], true);
        }
      } catch (e) {
        removeThinking();
        showToast('Network error. Please try again.', true);
      } finally {
        isSending = false;
        document.getElementById('sendBtn').disabled = false;
        input.focus();
      }
    }

    function showApiKeyModal() {
      const stored = localStorage.getItem('api-key') || '';
      document.getElementById('apiKeyInput').value = stored;
      document.getElementById('apiKeyErr').classList.remove('show');
      document.getElementById('apiKeyModal').classList.add('open');
    }

    function saveApiKey() {
      const val = document.getElementById('apiKeyInput').value.trim();
      if (!val) { document.getElementById('apiKeyErr').classList.add('show'); return; }
      localStorage.setItem('api-key', val);
      document.getElementById('apiKeyModal').classList.remove('open');
      showToast('API key saved');
    }

    document.getElementById('apiKeyInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveApiKey();
    });

    document.getElementById('apiKeyModal').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('open');
    });

    function esc(s) {
      return String(s || '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadSessions();

    if (sessions.length === 0) {
      newChat();
    } else {
      activeSessId = sessions[0].id;
      renderSidebar();
      renderMessages();
    }

    if (!localStorage.getItem('api-key')) {
      showApiKeyModal();
    }

    if (!modelKey) {
      document.getElementById('modelNameDisplay').textContent = 'No model selected';
    }

    document.getElementById('inputBox').focus();
  </script>
</body>
</html>
